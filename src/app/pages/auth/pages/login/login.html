<div class="card bg-base-200 w-80 shadow-sm">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="card-body gap-4">
    <h2 class="card-title text-xl font-medium">Login to Spotter</h2>
    <div>
      <label class="input w-full" [class.input-error]="submitted && loginForm.get('username')!.invalid">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g
            stroke-linejoin="round"
            stroke-linecap="round"
            stroke-width="2.5"
            fill="none"
            stroke="currentColor"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </g>
        </svg>
        <input type="text" formControlName="username" placeholder="Username"/>
      </label>
    </div>
    <div>
      <label class="input w-full" [class.input-error]="submitted && loginForm.get('password')!.invalid">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g
            stroke-linejoin="round"
            stroke-linecap="round"
            stroke-width="2.5"
            fill="none"
            stroke="currentColor"
          >
            <path
              d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
            ></path>
            <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
          </g>
        </svg>
        <input type="password" formControlName="password" placeholder="Password"/>
      </label>
    </div>
    <div class="card-actions">
      <button class="btn btn-primary w-full" [disabled]="loading()" type="submit">
        @if (loading()) {
          <span class="loading loading-spinner loading-xs"></span>
        } @else {
          Sign In
        }
      </button>
    </div>
  </form>
</div>
